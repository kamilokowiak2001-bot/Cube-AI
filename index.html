<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube AI</title>
    <link rel="stylesheet" href="css/hamburger.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
</head>

<body>
    <nav class="nav">
        <svg class="nav__logo" xmlns="http://www.w3.org/2000/svg" width="65" height="70" viewBox="0 0 65 70"
            fill="none">
            <path
                d="M3.10992 17.5248L31.6099 30.0248L61.1099 17.5248M32.1099 30.0248V68.0248M40.1099 2.64359L55.7199 11.656C60.6703 14.5141 63.7199 19.7961 63.7199 25.5124V43.5372C63.7199 49.2534 60.6703 54.5355 55.7199 57.3936L40.1099 66.406C35.1595 69.2641 29.0603 69.2641 24.1099 66.406L8.5 57.3936C3.54958 54.5355 0.5 49.2534 0.5 43.5372V25.5124C0.5 19.7961 3.54958 14.5141 8.5 11.656L24.1099 2.64359C29.0603 -0.214532 35.1595 -0.214531 40.1099 2.64359Z"
                stroke="black" />
        </svg>
        <div class="company">
            <p class="company__name">Cube AI</p>
            <p class="company__slogan">Shitty Ai for your company.</p>
        </div>


        <div class="nav__mobile">
            <button class="hamburger hamburger--spin" type="button">
                <span class="hamburger-box">
                    <span class="hamburger-inner"></span>
                </span>
            </button>
        </div>

        <div class="nav__desktop">
            <a class="nav__link" href="#offer">Offer</a>
            <a class="nav__link" href="#about-us">About us</a>
            <a class="nav__link" href="#blog">Blog</a>
            <a class="nav__link" href="#contact">Contact</a>
            <button class="main-btn">Contact us</button>
        </div>
    </nav>

    <div class="offcanvas">
        <a class="nav__link" href="#offer">Offer</a>
        <a class="nav__link" href="#about-us">About us</a>
        <a class="nav__link" href="#blog">Blog</a>
        <a class="nav__link" href="#contact">Contact</a>
        <button class="main-btn">Contact us</button>
    </div>

    <main>

        <section class="hero wrapper">

            <div class="hero__txt">
                <span class="hero__badge">
                    <span class="hero__badge-icon">🌐</span>
                    Worst LLM in world
                </span>
                <h1 class="hero__title">Shitty Ai for the shitty company</h1>
                <p class="hero__desc">
                    We are worst AI providing company in World.
                    Our LLM is is worse than even ChatGPT.
                    That speaks for itself.
                </p>
                <a href="#contact" class="hero-btn main-btn">Request a demo</a>
            </div>

            <div class="hero__img">
                <img src="/img/Hero.jpg" alt="Cube AI illustration">
            </div>

        </section>

    </main>

    <script src="js/script.js"></script>
</body>

</html>
